!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Z-Index Playground</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* 🔵 BLUE BOX (outside) */
    .outside {
      position: relative;
      z-index: 2;
      background: blue;
      color: white;
      padding: 20px;
    }

    /* 🟡 PARENT (creates stacking context) */
    .parent {
      position: relative;
      background: yellow;
      height: 200px;
      margin-top: -50px;
    }

    /* 🔴 CHILD (tries to escape) */
    .child {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 150px;
      height: 150px;
      background: red;
      z-index: 999;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    /* 🟢 EXTRA ELEMENT */
    .floating {
      position: absolute;
      top: 40px;
      left: 40px;
      width: 150px;
      height: 150px;
      background: green;
      z-index: 1;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

  </style>
</head>

<body>

  <div class="outside">BLUE (z-index: 2)</div>

  <div class="parent">
    <div class="child">RED 999</div>
  </div>

  <div class="floating">GREEN (z-index: )</div>

</body>
</html>
