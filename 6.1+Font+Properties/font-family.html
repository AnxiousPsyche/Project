<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Font Family</title>
  <style>
    h1 {
      font-family: Schoolbell, cursive;
    }
    #Charis-SIL {
      font-family: "Charis SIL", serif;
    }
    #Overlock-SC {
      font-family: "Overlock SC", sans-serif;
    }
    #Petit-Formal-Script {
      font-family: "Petit Formal Script", cursive;
    }
    
  </style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Charis+SIL:ital,wght@0,400;0,700;1,400;1,700&family=Overlock+SC&family=Petit+Formal+Script&family=Schoolbell&display=swap" rel="stylesheet">


</head>

<body>
  <h1>Font Family</h1>
  <p id="Charis-SIL">Charis SIL</p>
  <p id="Overlock-SC">Overlock SC</p>
  <p id="Petit-Formal-Script">Petit Formal Script</p>

</body>

</html>
